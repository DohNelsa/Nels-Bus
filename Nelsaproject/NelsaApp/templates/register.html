<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Register - Ticket Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://ai-public.creatie.ai/gen_page/tailwind-custom.css" rel="stylesheet">    <script src="https://cdn.tailwindcss.com/3.4.5?plugins=forms@0.5.7,typography@0.5.13,aspect-ratio@0.4.2,container-queries@0.1.1"></script>
    <script src="https://ai-public.creatie.ai/gen_page/tailwind-config.min.js" data-color="#000000" data-border-radius="small"></script>
</head>
<body class="min-h-screen bg-gray-50 font-inter">
    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b border-gray-200">            <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex">                        <div class="flex-shrink-0 flex items-center">
                            <img class="h-8 w-auto" src="https://ai-public.creatie.ai/gen_page/logo_placeholder.png" alt="Logo">                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">            <div class="max-w-md w-full space-y-8">
                <div>
                    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Create your account</h2>
                    <p class="mt-2 text-center text-sm text-gray-600">
                        Join our ticket booking platform
                    </p>                </div>
                <form class="mt-8 space-y-6" action="#" method="POST">
                    {{ form }}
                </form>
            </div>
        </main>

        <footer class="bg-white">            <div class="max-w-8xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
               
        </footer>
    </div>
</body>
</html>
