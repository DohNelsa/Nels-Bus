{% extends 'NelsaApp/base.html' %}
{% load static %}

{% block title %}Page Not Found - NelsaNdo{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="mx-auto h-24 w-24 text-gray-400">
                <i class="fas fa-exclamation-triangle text-6xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Page Not Found
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="mt-6">
                <a href="{% url 'index' %}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    <i class="fas fa-home mr-2"></i>
                    Go to Homepage
                </a>
            </div>
            <div class="mt-4">
                <a href="{% url 'admin_dashboard' %}" class="text-blue-600 hover:text-blue-500">
                    Admin Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
