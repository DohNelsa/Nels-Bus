<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); width: 300px; text-align: center;">
        <h2 style="margin-bottom: 20px; color: #333;">Forgot Password</h2>
        <p style="color: #555; margin-bottom: 20px;">Please enter your email address to reset your password.</p>
        <form action="/reset-password" method="POST">
            <div style="margin-bottom: 15px; text-align: left;">
                <label for="email" style="display: block; margin-bottom: 5px; color: #555;">Email Address</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">Reset Password</button>
        </form>
        <p style="margin-top: 15px; color: #555;">Remember your password? <a href="{% url 'Forgot_password' %}" style="color: #007bff; text-decoration: none;">Login here</a></p>
    </div>
</body>
</html>
