{% extends 'NelsaApp/base.html' %}
{% block title %}Verify SMS Receipt - GARANTI EXPRESS{% endblock %}
{% block content %}
<div class="pt-20 pb-12">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
      <div class="bg-blue-600 px-6 py-4">
        <div class="flex items-center">
          <div class="flex-shrink-0">
            <i class="fas fa-receipt text-white text-3xl"></i>
          </div>
          <div class="ml-3">
            <h2 class="text-xl font-bold text-white">SMS Receipt Verification</h2>
            <p class="text-blue-100">Enter the Code from the passenger SMS.</p>
          </div>
        </div>
      </div>

      <div class="p-6">
        <div class="mb-4">
          <label for="receiptCode" class="block text-sm font-medium text-gray-700 mb-1">
            Receipt Code
          </label>
          <input
            type="text"
            id="receiptCode"
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
            placeholder="Example: GAR-1A2B3C4D5E6F"
          />
        </div>

        <button
          id="verifyBtn"
          class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
          Verify
        </button>

        <div id="result" class="mt-5"></div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const verifyBtn = document.getElementById('verifyBtn');
    const receiptCodeEl = document.getElementById('receiptCode');
    const resultEl = document.getElementById('result');

    verifyBtn.addEventListener('click', async function () {
      const code = (receiptCodeEl.value || '').trim();
      resultEl.innerHTML = '';

      if (!code) {
        resultEl.innerHTML = '<div class="text-red-600 text-sm">Please enter a receipt code.</div>';
        return;
      }

      try {
        const res = await fetch(`/verify-sms-receipt/${encodeURIComponent(code)}/`);
        const data = await res.json();

        if (!res.ok || !data.valid) {
          resultEl.innerHTML = '<div class="text-red-600 text-sm">' + (data.message || 'Invalid code') + '</div>';
          return;
        }

        const seats = (data.seats || []).join(', ');
        resultEl.innerHTML =
          '<div class="p-4 rounded-md border border-green-200 bg-green-50">' +
          '<div class="text-green-800 font-semibold mb-1">Valid Booking</div>' +
          '<div class="text-sm text-green-900"><strong>Passenger:</strong> ' + data.passenger_name + '</div>' +
          '<div class="text-sm text-green-900"><strong>Route:</strong> ' + data.route + '</div>' +
          '<div class="text-sm text-green-900"><strong>Bus Type:</strong> ' + data.bus_type + '</div>' +
          '<div class="text-sm text-green-900"><strong>Seats:</strong> ' + seats + '</div>' +
          '<div class="text-sm text-green-900"><strong>Departure:</strong> ' + data.departure + '</div>' +
          '</div>';
      } catch (e) {
        resultEl.innerHTML = '<div class="text-red-600 text-sm">Verification failed. Please try again.</div>';
      }
    });
  });
</script>
{% endblock %}
